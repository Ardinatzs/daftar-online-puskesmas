<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Online Puskesmas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Pendaftaran Online Puskesmas</h1>

<form id="formDaftar">

<label>Nama Lengkap</label>
<input type="text" id="nama" required>

<label>NIK</label>
<input type="text" id="nik" required>

<label>Nomor HP</label>
<input type="text" id="hp" required>

<label>Jenis Kelamin</label>
<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Tanggal Berobat</label>
<input type="date" id="tanggal" required>

<label>Poli Tujuan</label>
<select id="poli">
<option>Poli Umum</option>
<option>Poli Gigi</option>
<option>Poli Anak</option>
<option>Poli Lansia</option>
<option>Poli Ibu & Anak</option>
</select>

<label>Keluhan</label>
<textarea id="keluhan"></textarea>

<button type="submit">Daftar Sekarang</button>

</form>

<hr>

<h2>Data Pendaftaran</h2>

<table>

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>NIK</th>
<th>HP</th>
<th>JK</th>
<th>Tanggal</th>
<th>Poli</th>
<th>Keluhan</th>

</tr>

</thead>

<tbody id="hasil"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
